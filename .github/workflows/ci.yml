name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  checks:
    name: Build & checks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build ./...

      - name: Check gofmt
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$output"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          # Build paths list dynamically since go.sum may not exist (zero-dep lib)
          paths=(go.mod)
          if [ -f go.sum ]; then paths+=(go.sum); fi
          if ! git diff --exit-code "${paths[@]}"; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Run golangci-lint
        # wasm/ is excluded — it uses syscall/js which can't be type-checked
        # outside of GOOS=js/GOARCH=wasm builds.
        run: golangci-lint run ./token/... ./ast/... ./parser/... ./validate/... ./eval/... ./examples/... ./internal/... ./conformance/... .

  test:
    name: Unit tests
    runs-on: self-hosted
    needs: [checks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        # The race detector requires cgo; the self-hosted runner defaults to
        # CGO_ENABLED=0 and has no gcc (cgo's default), so enable cgo and point
        # it at the clang that is installed.
        env:
          CGO_ENABLED: "1"
          CC: clang
        run: |
          go test -race -count=1 \
            -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./token/...,./ast/...,./parser/...,./validate/...,./eval/...,./ \
            ./token/... ./ast/... ./parser/... ./validate/... ./eval/... ./conformance/... .

      - name: Print coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  wasm:
    name: WASM build & JS tests
    runs-on: self-hosted
    needs: [checks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # make build compiles query.wasm and copies Go's wasm_exec.js into
      # clients/npm, both of which the JavaScript tests load.
      - name: Build WASM
        run: make -C wasm build

      - name: Install npm deps
        run: cd clients/npm && npm install

      - name: Typecheck TypeScript bindings
        run: cd clients/npm && ./node_modules/.bin/tsc --noEmit -p tsconfig.json

      - name: Run JS WASM tests
        run: node --test clients/npm/test/wasm.test.mjs

      - name: Run JS conformance tests
        run: node --test clients/npm/test/conformance.test.mjs

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: query-wasm
          path: clients/npm/query.wasm

  dart:
    name: Dart client & conformance (FFI + WASM)
    runs-on: self-hosted
    needs: [checks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.5"

      # Build the cgo c-shared library the Dart FFI backend loads. clang is used
      # because the self-hosted runner has no gcc (cgo's default compiler).
      - name: Build native libquery
        env:
          CGO_ENABLED: "1"
          CC: clang
        run: make -C clients/ffi build

      # Build query.wasm + wasm_exec.js and stage them (with the corpus) into
      # test/ so the browser test server can serve them.
      - name: Build web assets
        run: make -C clients/flutter web-assets

      - name: Install Dart deps
        run: cd clients/flutter && dart pub get

      - name: Analyze Dart client
        run: cd clients/flutter && dart analyze --fatal-infos

      # The native FFI backend runs the corpus on the Dart VM; the web
      # (dart:js_interop) backend runs the same corpus against the WASM build in
      # the runner's system Chrome.
      - name: Run Dart conformance (VM/FFI + browser/WASM)
        env:
          CHROME_EXECUTABLE: /usr/bin/google-chrome-stable
        run: cd clients/flutter && dart test -p vm,chrome

  android:
    name: Android (build + emulator)
    runs-on: self-hosted
    needs: [checks]
    timeout-minutes: 30
    # The self-hosted box has one AVD shared across its concurrent runners;
    # serialize so two emulator runs never contend for it (queue, don't cancel).
    concurrency:
      group: android-emulator
      cancel-in-progress: false
    env:
      ANDROID_HOME: /home/davixcky/development/android
      ANDROID_SDK_ROOT: /home/davixcky/development/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Cross-compile one libquery.so per ABI with the runner's NDK.
      - name: Build per-ABI libquery.so
        run: |
          export ANDROID_NDK_HOME="$(ls -d "$ANDROID_HOME"/ndk/* | sort -V | tail -1)"
          echo "using NDK: $ANDROID_NDK_HOME"
          make -C clients/ffi android

      # Assert each .so is a real Android object for the right arch, 16KB
      # page-aligned (Google Play mandate), with the FFI exports present.
      - name: Assert ELF arch, 16KB alignment, and FFI exports
        run: |
          ndk="$(ls -d "$ANDROID_HOME"/ndk/* | sort -V | tail -1)"
          bin="$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
          jni=clients/flutter_plugin/android/src/main/jniLibs
          fail=0
          check() { # <abi> <arch-substring>
            so="$jni/$1/libquery.so"
            echo "== $1 =="
            file "$so" | grep -q "$2" || { echo "  FAIL: wrong arch ($2)"; fail=1; }
            aligned=$("$bin/llvm-objdump" -p "$so" | grep -A1 LOAD | grep align | grep -v '2\*\*14' || true)
            [ -z "$aligned" ] || { echo "  FAIL: not 16KB-aligned:"; echo "$aligned"; fail=1; }
            "$bin/llvm-nm" -D "$so" | grep -q "T QueryParse" || { echo "  FAIL: QueryParse not exported"; fail=1; }
            [ "$fail" = 0 ] && echo "  ok: arch, 16KB alignment, exports"
          }
          check arm64-v8a   "ARM aarch64"
          check armeabi-v7a "ARM, EABI5"
          check x86_64      "x86-64"
          exit $fail

      # The real proof: build an APK that bundles the x86_64 libquery.so, install
      # it on the emulator, and run the integration test — TrazoQuery.load() must
      # open the bundled .so, resolve the FFI symbols, and run the Go engine.
      - name: Run on-device integration test
        run: |
          export PATH="$PATH:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:/home/davixcky/development/flutter/bin"
          cd clients/flutter_plugin/example
          flutter create --platforms=android --project-name trazo_query_flutter_example .
          flutter pub get
          # Start from a clean emulator state.
          pkill -f "emulator -avd admin_test" || true
          adb kill-server || true; adb start-server
          nohup "$ANDROID_HOME/emulator/emulator" -avd admin_test \
            -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect \
            > /tmp/emu-ci.log 2>&1 &
          adb wait-for-device
          for i in $(seq 1 60); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 5
          done
          [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] || \
            { echo "emulator failed to boot"; cat /tmp/emu-ci.log; exit 1; }
          flutter test integration_test/load_test.dart -d emulator-5554

      - name: Shut down emulator
        if: always()
        run: |
          export PATH="$PATH:$ANDROID_HOME/platform-tools"
          adb -s emulator-5554 emu kill 2>/dev/null || pkill -f "emulator -avd admin_test" || true
